  <style>
    .strava-hero {
      text-align: center;
      background: var(--cream);
      border-bottom: 2px solid var(--ink);
      padding: 2.5rem 2rem 2rem;
    }
    .strava-hero h1 { border-bottom: none; padding-bottom: 0; }

    /* Activity card */
    .activity-card {
      background: var(--white);
      border: 1px solid var(--fog);
      border-top: 4px solid #c4621a;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .activity-header {
      padding: 1.2rem 1.4rem 0.75rem;
      border-bottom: 1px solid var(--fog);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .activity-date {
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--pine);
      margin-bottom: 0.3rem;
      display: block;
    }
    .activity-title {
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    .strava-link {
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid var(--teal);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 4px;
    }
    .strava-link:hover { color: var(--ink); border-bottom-color: var(--ink); }

    /* Stats row */
    .activity-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--fog);
    }
    .activity-stat {
      padding: 0.85rem 0.75rem;
      text-align: center;
      border-right: 1px solid var(--fog);
    }
    .activity-stat:last-child { border-right: none; }
    .activity-stat-val {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--ink);
      line-height: 1;
      display: block;
    }
    .activity-stat-lbl {
      font-family: var(--sans);
      font-size: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #c4621a;
      margin-top: 3px;
      display: block;
    }

    /* Map */
    .activity-map {
      height: 260px;
      width: 100%;
      background: var(--paper);
      position: relative;
      z-index: 0;
      isolation: isolate;
      overflow: hidden;
    }
    .activity-map.no-route {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--trail);
    }

    /* Caption */
    .activity-caption {
      padding: 1.2rem 1.4rem;
      font-family: var(--body);
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--earth);
      border-top: 1px solid var(--fog);
    }
    .activity-caption p { margin-bottom: 0.75rem; }
    .activity-caption p:last-child { margin-bottom: 0; }
    .no-caption {
      font-style: italic;
      color: var(--trail);
    }

    /* Photos */
    .activity-photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 3px;
      border-top: 1px solid var(--fog);
    }
    .activity-photos img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--trail);
    }
    .empty-state p { font-style: italic; margin-top: 0.5rem; }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      font-family: var(--sans);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--trail);
    }

    /* Strava badge */
    .powered-by {
      text-align: center;
      padding: 1.5rem;
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--trail);
    }
    .powered-by a { color: var(--teal); text-decoration: none; border-bottom: 1px solid var(--teal); }

    @media (max-width: 600px) {
      .activity-stats { grid-template-columns: repeat(2, 1fr); }
      .activity-stats .activity-stat:nth-child(2) { border-right: none; }
      .activity-stats .activity-stat:nth-child(3) { border-top: 1px solid var(--fog); }
      .activity-stats .activity-stat:nth-child(4) { border-top: 1px solid var(--fog); }
    }
  </style>

<header class="strava-hero">
  <div class="container">
    <h1>Strava Log</h1>
    <span class="section-label" style="margin-top:0.4rem;display:block">Data synced from Strava. Updates nightly if I have service.</span>
  </div>
</header>

<main>
  <section>
    <div class="container-narrow">

      <div id="activities-container">
        <div class="loading-state">Loading activities…</div>
      </div>

    </div>
  </section>
</main>

<footer>
  <div class="foot-logo">Laura on Trail</div>
  <p>Springer Mountain, GA → Katahdin, ME · NOBO 2026</p>
</footer>

<script src="comments.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// This page reads from data/strava-activities.json, which is written by
// the nightly strava-sync.js GitHub Action.
const DATA_URL = 'data/strava-activities.json';

// ── HELPERS ─────────────────────────────────────────────────────────────────
function metersToMiles(m) { return (m / 1609.34).toFixed(2); }
function metersToFeet(m)  { return Math.round(m * 3.28084).toLocaleString(); }

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatPace(seconds, meters) {
  if (!meters) return '—';
  const secsPerMile = seconds / (meters / 1609.34);
  const m = Math.floor(secsPerMile / 60);
  const s = Math.round(secsPerMile % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatDate(isoString) {
  const d = new Date(isoString);
  return d.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

// ── POLYLINE DECODER ────────────────────────────────────────────────────────
// Decodes a Google-encoded polyline string into [[lat,lng], ...] pairs
function decodePolyline(encoded) {
  if (!encoded) return [];
  const points = [];
  let index = 0, lat = 0, lng = 0;
  while (index < encoded.length) {
    let b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    points.push([lat / 1e5, lng / 1e5]);
  }
  return points;
}

// ── RENDER ACTIVITY ─────────────────────────────────────────────────────────
let mapCount = 0;

function renderActivity(activity) {
  const mapId = `map-${mapCount++}`;
  const points = decodePolyline(activity.map_polyline);
  const hasRoute = points.length > 0;

  const distMi  = metersToMiles(activity.distance);
  const elevFt  = metersToFeet(activity.total_elevation_gain);
  const timeStr = formatTime(activity.moving_time);
  const pace    = formatPace(activity.moving_time, activity.distance);
  const dateStr = formatDate(activity.start_date_local || activity.start_date);

  // Clean caption — strip "End mile: NNN" line
  const rawDesc = (activity.description || '').trim();
  const cleanDesc = rawDesc.replace(/end\s*mile[:\s\-]+[\d.]+/gi, '').trim();
  const paragraphs = cleanDesc
    ? cleanDesc.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,' ').trim()}</p>`).join('')
    : `<p class="no-caption">No caption for this activity.</p>`;

  // Photos
  const photoHTML = activity.photos && activity.photos.length
    ? `<div class="activity-photos">${activity.photos.map(url =>
        `<img src="${url}" alt="Trail photo" loading="lazy">`).join('')}</div>`
    : '';

  const stravaUrl = activity.id
    ? `https://www.strava.com/activities/${activity.id}`
    : null;

  const card = document.createElement('div');
  card.className = 'activity-card';
  card.innerHTML = `
    <div class="activity-header">
      <div>
        <span class="activity-date">${dateStr}</span>
        <div class="activity-title">${activity.name || 'Trail Day'}</div>
        ${cleanDesc ? `<div class="activity-caption" style="border-top:none;padding:0.5rem 0 0">${paragraphs}</div>` : ''}
      </div>
      ${stravaUrl ? `<a href="${stravaUrl}" target="_blank" class="strava-link">View on Strava →</a>` : ''}
    </div>

    <div class="activity-stats">
      <div class="activity-stat">
        <span class="activity-stat-val">${distMi}</span>
        <span class="activity-stat-lbl">Miles</span>
      </div>
      <div class="activity-stat">
        <span class="activity-stat-val">${timeStr}</span>
        <span class="activity-stat-lbl">Moving time</span>
      </div>
      <div class="activity-stat">
        <span class="activity-stat-val">${elevFt} ft</span>
        <span class="activity-stat-lbl">Elevation gain</span>
      </div>
      <div class="activity-stat">
        <span class="activity-stat-val">${pace}</span>
        <span class="activity-stat-lbl">Pace / mi</span>
      </div>
    </div>

    <div class="${hasRoute ? 'activity-map' : 'activity-map no-route'}" id="${mapId}">
      ${hasRoute ? '' : 'No route data available'}
    </div>

    ${photoHTML}

    <div style="padding:1.5rem 1.4rem;border-top:1px solid var(--fog)">
      <span style="font-family:var(--sans);font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:#c4621a;display:block;margin-bottom:0.75rem">Comments</span>
      <div class="comments-widget" data-slug="activity-${activity.id || mapId}"></div>
    </div>
  `;

  // Render map after card is in DOM
  if (hasRoute) {
    setTimeout(() => {
      const mapEl = document.getElementById(mapId);
      if (!mapEl) return;
      const map = L.map(mapEl, {
        zoomControl: false,
        scrollWheelZoom: false,
        dragging: false,
        touchZoom: false,
        doubleClickZoom: false,
        attributionControl: false,
      });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
      }).addTo(map);
      const polyline = L.polyline(points, {
        color: '#c4621a',
        weight: 3.5,
        opacity: 0.9,
      }).addTo(map);
      map.fitBounds(polyline.getBounds(), { padding: [20, 20] });

      // Start/end markers
      if (points.length > 1) {
        const dot = { radius: 6, fillOpacity: 1, weight: 2, color: '#fff' };
        L.circleMarker(points[0], { ...dot, fillColor: '#c4621a' }).addTo(map);
        L.circleMarker(points[points.length - 1], { ...dot, fillColor: '#8b3a1a' }).addTo(map);
      }
    }, 0);
  }

  return card;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const container = document.getElementById('activities-container');
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('No data yet');
    const activities = await res.json();

    if (!activities.length) {
      container.innerHTML = `
        <div class="empty-state">
          <p>No activities yet — check back once the hike starts on April 28!</p>
        </div>`;
      return;
    }

    container.innerHTML = '';
    activities.forEach(a => container.appendChild(renderActivity(a)));
    if (window.initComments) window.initComments();

  } catch (e) {
    container.innerHTML = `
      <div class="empty-state">
        <p>Activities will appear here once the hike begins and Strava syncs.</p>
        <p style="font-size:0.8rem;margin-top:0.5rem;font-family:var(--sans)">Check back after April 28, 2026</p>
      </div>`;
  }
}

init();
</script>

<script>
function toggleNav() {
  var btn  = document.getElementById("nav-hamburger");
  var menu = document.getElementById("nav-mobile-menu");
  btn.classList.toggle("open");
  menu.classList.toggle("open");
}
document.addEventListener("click", function(e) {
  var btn  = document.getElementById("nav-hamburger");
  var menu = document.getElementById("nav-mobile-menu");
  if (menu && menu.classList.contains("open") && !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    btn.classList.remove("open");
    menu.classList.remove("open");
  }
});
</script>
</body>
