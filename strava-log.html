  <style>
    .strava-hero {
      text-align: center;
      background: var(--cream);
      border-bottom: 2px solid var(--ink);
      padding: 2.5rem 2rem 2rem;
    }
    .strava-hero h1 { border-bottom: none; padding-bottom: 0; }

    /* Activity card */
    .activity-card {
      background: var(--white);
      border: 1px solid var(--fog);
      border-top: 4px solid #c4621a;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .activity-header {
      padding: 1.2rem 1.4rem 0.75rem;
      border-bottom: 1px solid var(--fog);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .activity-date {
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--pine);
      margin-bottom: 0.3rem;
      display: block;
    }
    .activity-title {
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    .strava-link {
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid var(--teal);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 4px;
    }
    .strava-link:hover { color: var(--ink); border-bottom-color: var(--ink); }

    /* Stats row */
    .activity-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--fog);
    }
    .activity-stat {
      padding: 0.85rem 0.75rem;
      text-align: center;
      border-right: 1px solid var(--fog);
    }
    .activity-stat:last-child { border-right: none; }
    .activity-stat-val {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--ink);
      line-height: 1;
      display: block;
    }
    .activity-stat-lbl {
      font-family: var(--sans);
      font-size: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #c4621a;
      margin-top: 3px;
      display: block;
    }

    /* AT section badge — sits inside activity header */
    .activity-section-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.55rem;
      font-family: var(--sans);
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--pine);
    }
    .section-badge-dot {
      width: 6px;
      height: 6px;
      background: var(--pine);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Elevation chart */
    .activity-elevation {
      background: var(--cream);
      border-top: 1px solid var(--fog);
      overflow: hidden;
      line-height: 0;
      padding: 0.5rem 1.25rem;
    }
    .activity-elevation svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Caption */
    .activity-caption {
      padding: 1.2rem 1.4rem;
      font-family: var(--body);
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--earth);
      border-top: 1px solid var(--fog);
    }
    .activity-caption p { margin-bottom: 0.75rem; }
    .activity-caption p:last-child { margin-bottom: 0; }
    .no-caption {
      font-style: italic;
      color: var(--trail);
    }

    /* Photos & videos */
    .activity-photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 3px;
      border-top: 1px solid var(--fog);
    }
    .activity-photos img,
    .activity-photos video {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--trail);
    }
    .empty-state p { font-style: italic; margin-top: 0.5rem; }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      font-family: var(--sans);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--trail);
    }

    /* Strava badge */
    .powered-by {
      text-align: center;
      padding: 1.5rem;
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--trail);
    }
    .powered-by a { color: var(--teal); text-decoration: none; border-bottom: 1px solid var(--teal); }

    @media (max-width: 600px) {
      .activity-stats { grid-template-columns: repeat(2, 1fr); }
      .activity-stats .activity-stat:nth-child(2) { border-right: none; }
      .activity-stats .activity-stat:nth-child(3) { border-top: 1px solid var(--fog); }
      .activity-stats .activity-stat:nth-child(4) { border-top: 1px solid var(--fog); }
    }
  </style>

<main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// This page reads from data/strava-activities.json, which is written by
// the nightly strava-sync.js GitHub Action.
const DATA_URL = 'data/strava-activities.json';

// ── HELPERS ─────────────────────────────────────────────────────────────────
function metersToMiles(m) { return (m / 1609.34).toFixed(2); }
function metersToFeet(m)  { return Math.round(m * 3.28084).toLocaleString(); }

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatPace(seconds, meters) {
  if (!meters) return '—';
  const secsPerMile = seconds / (meters / 1609.34);
  const m = Math.floor(secsPerMile / 60);
  const s = Math.round(secsPerMile % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatDate(isoString) {
  const d = new Date(isoString);
  return d.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

// ── AT SECTION LOOKUP ────────────────────────────────────────────────────────
// [maxMile, sectionName, state(s)]
const AT_SECTIONS = [
  [30,   'Springer Mountain to Neels Gap',          'Georgia'],
  [76,   'Blood Mountain Wilderness',               'Georgia'],
  [106,  'Nantahala National Forest — South',       'North Carolina'],
  [165,  'Nantahala Gorge',                         'North Carolina'],
  [237,  'Great Smoky Mountains National Park',     'Tennessee / North Carolina'],
  [290,  'Hot Springs Region',                      'Tennessee / North Carolina'],
  [342,  'Roan Highlands',                          'Tennessee / North Carolina'],
  [400,  'Iron Mountains',                          'Tennessee'],
  [453,  'Damascus & Grayson Highlands',            'Virginia'],
  [554,  'Mount Rogers National Recreation Area',   'Virginia'],
  [680,  'Central Virginia',                        'Virginia'],
  [723,  'Shenandoah Valley Approach',              'Virginia'],
  [812,  'Shenandoah National Park',                'Virginia'],
  [903,  'Northern Virginia & Maryland',            'Maryland'],
  [1000, 'Pennsylvania — The Rollercoaster',        'Pennsylvania'],
  [1090, 'Pennsylvania — The Rocks',                'Pennsylvania'],
  [1160, 'New Jersey & New York',                   'New Jersey / New York'],
  [1220, 'Connecticut',                             'Connecticut'],
  [1270, 'Massachusetts',                           'Massachusetts'],
  [1400, 'Vermont — Long Trail Country',            'Vermont'],
  [1500, 'White Mountains',                         'New Hampshire'],
  [1600, 'Southern Maine',                          'Maine'],
  [1900, '100-Mile Wilderness',                     'Maine'],
  [2198, 'Baxter State Park',                       'Maine'],
];
const AT_TOTAL = 2198;

function getATSection(mile) {
  return AT_SECTIONS.find(([max]) => mile <= max) || AT_SECTIONS[AT_SECTIONS.length - 1];
}

function parseMile(description) {
  if (!description) return null;
  const m = description.match(/end\s*mile[:\s\-]+([\d.]+)/i);
  return m ? parseFloat(m[1]) : null;
}

// Returns a compact inline badge string (injected into the header, not a separate block)
function sectionBadgeHTML(activity) {
  const mile = activity.end_mile ?? parseMile(activity.description);
  if (mile === null) return '';
  const [, name, state] = getATSection(mile);
  return `<div class="activity-section-badge"><span class="section-badge-dot"></span>${name} &middot; ${state} &middot; Mile ${mile}</div>`;
}

// ── ELEVATION CHART ──────────────────────────────────────────────────────────
function renderElevationChart(activity) {
  const elev = activity.altitude_stream;
  if (!elev || elev.length < 2) return '';

  const W = 1000, H = 160;
  const PL = 85, PR = 12, PT = 14, PB = 18;
  const CW = W - PL - PR, CH = H - PT - PB;
  const n = elev.length;

  const minE = Math.min(...elev);
  const maxE = Math.max(...elev);
  const range = maxE - minE || 1;

  const pts = elev.map((v, i) => [
    PL + (i / (n - 1)) * CW,
    PT + (1 - (v - minE) / range) * CH,
  ]);

  // Light Catmull-Rom — removes GPS jitter, preserves real terrain shape
  const T = 0.15;
  let line = `M ${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for (let i = 0; i < n - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(n - 1, i + 2)];
    const cp1x = (p1[0] + (p2[0] - p0[0]) * T).toFixed(1);
    const cp1y = (p1[1] + (p2[1] - p0[1]) * T).toFixed(1);
    const cp2x = (p2[0] - (p3[0] - p1[0]) * T).toFixed(1);
    const cp2y = (p2[1] - (p3[1] - p1[1]) * T).toFixed(1);
    line += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }

  const base = PT + CH;
  const fill = `${line} L ${pts[n-1][0].toFixed(1)},${base} L ${pts[0][0].toFixed(1)},${base} Z`;

  const toFt  = m => Math.round(m * 3.28084).toLocaleString();
  const gid   = `eg${activity.id}`;

  return `<div class="activity-elevation"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2c5530" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2c5530" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <line x1="${PL}" y1="${base}" x2="${W-PR}" y2="${base}" stroke="#c8c2b6" stroke-width="0.8"/>
  <line x1="${PL}" y1="${PT}"   x2="${PL}"   y2="${base}" stroke="#c8c2b6" stroke-width="0.8"/>
  <path d="${fill}" fill="url(#${gid})"/>
  <path d="${line}" fill="none" stroke="#2c5530" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="${PL-6}" y="${PT+4}"   text-anchor="end" font-family="monospace" font-size="12" fill="#8a806e">${toFt(maxE)} ft</text>
  <text x="${PL-6}" y="${base-2}" text-anchor="end" font-family="monospace" font-size="12" fill="#8a806e">${toFt(minE)} ft</text>
</svg></div>`;
}

// ── RENDER ACTIVITY ─────────────────────────────────────────────────────────
function renderActivity(activity) {
  const distMi  = metersToMiles(activity.distance);
  const elevFt  = metersToFeet(activity.total_elevation_gain);
  const timeStr = formatTime(activity.moving_time);
  const pace    = formatPace(activity.moving_time, activity.distance);
  const dateStr = formatDate(activity.start_date_local || activity.start_date);

  // Clean caption — strip "End mile: NNN" line
  const rawDesc = (activity.description || '').trim();
  const cleanDesc = rawDesc.replace(/end\s*mile[:\s\-]+[\d.]+/gi, '').trim();
  const paragraphs = cleanDesc
    ? cleanDesc.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,' ').trim()}</p>`).join('')
    : `<p class="no-caption">No caption for this activity.</p>`;

  // Media (photos + videos) — use unified media array, fall back to legacy photos field
  const mediaItems = activity.media
    || (activity.photos || []).map(src => ({ type: 'photo', src }));

  const stravaActivityUrl = `https://www.strava.com/activities/${activity.id}`;

  const photoHTML = mediaItems.length
    ? `<div class="activity-photos">${mediaItems.map(item => {
        if (item.type === 'video') {
          if (item.playable) {
            // Actual .mp4 from Strava — embed directly
            return `<video src="${item.src}" poster="${item.thumbnail || ''}" controls preload="metadata" loading="lazy"></video>`;
          }
          // No playable URL — show thumbnail with a play-button overlay linking to Strava
          return `<a href="${item.stravaUrl || stravaActivityUrl}" target="_blank" rel="noopener"
              style="position:relative;display:block;aspect-ratio:4/3;overflow:hidden;background:var(--ink)">
              <img src="${item.thumbnail || item.src}" alt="Video thumbnail" loading="lazy"
                style="width:100%;height:100%;object-fit:cover;opacity:0.8">
              <span style="
                position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
                font-size:2.5rem;color:var(--white);text-shadow:0 2px 8px rgba(0,0,0,0.6);
                pointer-events:none">▶</span>
              <span style="
                position:absolute;bottom:0;left:0;right:0;padding:0.4rem 0.6rem;
                background:rgba(26,18,8,0.65);font-family:var(--sans);font-size:0.5rem;
                font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--white)">
                Watch on Strava ↗</span>
            </a>`;
        }
        return `<img src="${item.src}" alt="Trail photo" loading="lazy">`;
      }).join('')}</div>`
    : '';

  const card = document.createElement('div');
  card.className = 'activity-card';
  card.innerHTML = `
    <div class="activity-header">
      <div>
        <span class="activity-date">${dateStr}</span>
        <div class="activity-title">${activity.name || 'Trail Day'}</div>
        ${sectionBadgeHTML(activity)}
        ${cleanDesc ? `<div class="activity-caption" style="border-top:none;padding:0.5rem 0 0">${paragraphs}</div>` : ''}
      </div>
    </div>

    <div class="activity-stats">
      <div class="activity-stat">
        <span class="activity-stat-val">${distMi}</span>
        <span class="activity-stat-lbl">Miles</span>
      </div>
      <div class="activity-stat">
        <span class="activity-stat-val">${timeStr}</span>
        <span class="activity-stat-lbl">Moving time</span>
      </div>
      <div class="activity-stat">
        <span class="activity-stat-val">${elevFt} ft</span>
        <span class="activity-stat-lbl">Elevation gain</span>
      </div>
      <div class="activity-stat">
        <span class="activity-stat-val">${pace}</span>
        <span class="activity-stat-lbl">Pace / mi</span>
      </div>
    </div>

    ${renderElevationChart(activity)}

    ${photoHTML}

    <div style="padding:1.5rem 1.4rem;border-top:1px solid var(--fog)">
      <span style="font-family:var(--sans);font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:#c4621a;display:block;margin-bottom:0.75rem">Comments</span>
      <div class="comments-widget" data-slug="activity-${activity.id}"></div>
    </div>
  `;

  return card;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const container = document.getElementById('activities-container');
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('No data yet');
    const activities = await res.json();

    if (!activities.length) {
      container.innerHTML = `
        <div class="empty-state">
          <p>No activities yet — check back once the hike starts on April 28!</p>
        </div>`;
      return;
    }

    container.innerHTML = '';
    activities.forEach(a => container.appendChild(renderActivity(a)));
    if (window.initComments) window.initComments();

  } catch (e) {
    container.innerHTML = `
      <div class="empty-state">
        <p>Activities will appear here once the hike begins and Strava syncs.</p>
        <p style="font-size:0.8rem;margin-top:0.5rem;font-family:var(--sans)">Check back after April 28, 2026</p>
      </div>`;
  }
}

init();
</script>

<script>
function toggleNav() {
  var btn  = document.getElementById("nav-hamburger");
  var menu = document.getElementById("nav-mobile-menu");
  btn.classList.toggle("open");
  menu.classList.toggle("open");
}
document.addEventListener("click", function(e) {
  var btn  = document.getElementById("nav-hamburger");
  var menu = document.getElementById("nav-mobile-menu");
  if (menu && menu.classList.contains("open") && !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    btn.classList.remove("open");
    menu.classList.remove("open");
  }
});
</script>
