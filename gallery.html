<head>

  <meta property="og:title" content="Laura on Trail — AT Thru-Hike 2026">
  <meta property="og:description" content="Hiking 2,198 miles from Georgia to Maine. Follow along.">
  <meta property="og:image" content="https://lauratheexplorer.co/preview.jpg">
  <meta property="og:url" content="https://lauratheexplorer.co">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://lauratheexplorer.co/preview.jpg">

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-hero {
      text-align: center;
      background: var(--cream);
      padding: 3rem 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .filter-btn {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      border-radius: 2px;
      border: 1.5px solid var(--fog);
      background: transparent;
      color: var(--trail);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--pine);
      color: var(--white);
      border-color: var(--pine);
    }

    /* ── MASONRY GRID ── */
    .masonry {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .masonry-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .masonry-item {
      width: 100%;
      position: relative;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      background: var(--paper);
    }

    .masonry-item img,
    .masonry-item video {
      width: 100%;
      display: block;
      transition: transform 0.3s ease;
    }

    .masonry-item:hover img,
    .masonry-item:hover video {
      transform: scale(1.03);
    }

    .masonry-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(29,20,8,0.75) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.25s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem;
    }

    .masonry-item:hover .overlay { opacity: 1; }

    .overlay-caption {
      font-family: var(--body);
      font-size: 0.85rem;
      color: var(--white);
      line-height: 1.4;
      font-style: italic;
    }

    .overlay-meta {
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink);
      margin-top: 4px;
    }

    .overlay-link {
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fern);
      text-decoration: none;
      margin-top: 6px;
      display: inline-block;
      border-bottom: 1px solid var(--fern);
      padding-bottom: 1px;
    }

    .video-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(29,20,8,0.7);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 2px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lightbox-inner img,
    .lightbox-inner video {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 3px;
      display: block;
    }

    .lightbox-caption {
      margin-top: 1rem;
      text-align: center;
      color: var(--fog);
      font-style: italic;
      font-size: 0.95rem;
      max-width: 600px;
    }

    .lightbox-meta {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--trail);
      margin-top: 0.4rem;
    }

    .lightbox-post-link {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fern);
      text-decoration: none;
      border-bottom: 1px solid var(--fern);
      margin-top: 0.5rem;
      display: inline-block;
    }

    .lightbox-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      background: none;
      border: none;
      color: var(--fog);
      font-size: 1.5rem;
      cursor: pointer;
      font-family: var(--mono);
      line-height: 1;
      padding: 4px 8px;
      transition: color 0.15s;
    }
    .lightbox-close:hover { color: var(--white); }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(26,18,8,0.15);
      border: none;
      color: var(--fog);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.75rem 1rem;
      border-radius: 2px;
      transition: background 0.15s;
      font-family: var(--mono);
    }
    .lightbox-nav:hover { background: rgba(26,18,8,0.25); }
    .lightbox-nav.prev { left: -4rem; }
    .lightbox-nav.next { right: -4rem; }

    /* ── EMPTY STATE ── */
    .empty-section {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--trail);
      font-style: italic;
    }

    /* ── HOW TO ADD PHOTOS NOTE ── */
    .add-photos-note {
      background: var(--paper);
      border-left: 3px solid var(--pine);
      padding: 1rem 1.2rem;
      font-size: 0.85rem;
      color: var(--earth);
      border-radius: 0 3px 3px 0;
      margin-bottom: 2rem;
    }
    .add-photos-note code {
      background: var(--white);
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 0.8rem;
      font-family: var(--mono);
    }

    @media (max-width: 600px) {
      .masonry-col:nth-child(3) { display: none; }
      .lightbox-nav { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="blaze"></span>
    Laura on Trail
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>

    <li><a href="gallery.html" class="active">Gallery</a></li>

    <li><a href="resources.html">Resources</a></li>
  </ul>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-mobile-menu" id="nav-mobile-menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="strava-log.html">Strava</a></li>
    <li><a href="blog.html">Log</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="gear.html">Gear</a></li>
    <li><a href="resources.html">Resources</a></li>
  </ul>
</nav>

<header class="gallery-hero">
  <div class="hero-bg-lines"></div>
  <div class="container" style="position:relative;z-index:1;text-align:center">
    <h1 style="color:var(--ink);font-size:clamp(2rem,4vw,3rem)">Gallery</h1>
    <span class="section-label" style="color:var(--pine)">Photos & video from the trail</span>
  </div>
</header>


<main>
  <section>
    <div class="container">

      <!-- Filter bar -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterGallery('all', this)">All</button>
        <button class="filter-btn" onclick="filterGallery('strava', this)">From Strava</button>
        <button class="filter-btn" onclick="filterGallery('blog', this)">From Blog</button>
      </div>

      <!-- Masonry grid -->
      <div class="masonry" id="gallery-grid"></div>

    </div>
  </section>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-nav prev" onclick="navigateLightbox(-1)">‹</button>
    <button class="lightbox-nav next" onclick="navigateLightbox(1)">›</button>
    <div id="lightbox-media"></div>
    <div id="lightbox-caption" class="lightbox-caption"></div>
    <div id="lightbox-meta" class="lightbox-meta"></div>
    <a id="lightbox-post-link" class="lightbox-post-link" style="display:none" href="#">→ Read the post</a>
  </div>
</div>

<footer>
  <div class="foot-logo">Laura on Trail</div>
  <p>Springer Mountain, GA → Katahdin, ME · NOBO 2026</p>
</footer>

<script>
let ALL_ITEMS     = [];
let filteredItems = [];
let currentIndex  = 0;

// ── FETCH & INIT ──────────────────────────────────
async function initGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '<p class="empty-section" style="font-style:normal;opacity:0.5">Loading…</p>';
  try {
    const res = await fetch(`data/gallery.json?t=${Date.now()}`);
    ALL_ITEMS = res.ok ? await res.json() : [];
  } catch { ALL_ITEMS = []; }
  // Sort newest first
  ALL_ITEMS.sort((a, b) => new Date(b.date) - new Date(a.date));
  filteredItems = [...ALL_ITEMS];
  buildGallery(filteredItems);
}

// ── BUILD GALLERY ──────────────────────────────────
const NUM_COLS = 3;

function buildGallery(items) {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';

  if (items.length === 0) {
    grid.innerHTML = '<p class="empty-section">No photos yet — check back once the hike starts.</p>';
    return;
  }

  // Create columns
  const cols = Array.from({ length: NUM_COLS }, () => {
    const col = document.createElement('div');
    col.className = 'masonry-col';
    return col;
  });

  // Distribute items left-to-right (round-robin) so chronological order
  // reads across the top row first, then the next row, etc.
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'masonry-item';
    el.dataset.index = i;
    el.onclick = () => openLightbox(i);

    const videoBadge = item.type === 'video'
      ? '<div class="video-badge">▶ Video</div>' : '';

    const postLinkHtml = item.postLink
      ? `<a class="overlay-link" href="${item.postLink}" onclick="event.stopPropagation()">→ ${item.postTitle || 'Read post'}</a>`
      : '';

    let media;
    if (item.type === 'video') {
      media = item.playable
        ? `<video src="${item.src}" poster="${item.thumbnail || ''}" muted playsinline preload="metadata"></video>`
        : `<img src="${item.thumbnail || item.src}" alt="${item.caption || ''}" loading="lazy">`;
    } else {
      media = `<img src="${item.src}" alt="${item.caption || ''}" loading="lazy">`;
    }

    el.innerHTML = `
      ${videoBadge}
      ${media}
      <div class="overlay">
        ${item.caption ? `<div class="overlay-caption">${item.caption}</div>` : ''}
        <div class="overlay-meta">${[item.date, item.location].filter(Boolean).join(' · ')}</div>
        ${postLinkHtml}
      </div>`;

    cols[i % NUM_COLS].appendChild(el);
  });

  cols.forEach(col => grid.appendChild(col));
}

// ── FILTER ────────────────────────────────────────
function filterGallery(source, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  filteredItems = source === 'all'
    ? [...ALL_ITEMS]
    : ALL_ITEMS.filter(item => item.source === source);

  buildGallery(filteredItems);
}

// ── LIGHTBOX ──────────────────────────────────────
function openLightbox(index) {
  currentIndex = index;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  document.querySelectorAll('#lightbox-media video').forEach(v => v.pause());
}

function closeLightboxOnBg(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function navigateLightbox(dir) {
  currentIndex = (currentIndex + dir + filteredItems.length) % filteredItems.length;
  renderLightbox();
}

function renderLightbox() {
  const item = filteredItems[currentIndex];
  if (!item) return;

  const mediaEl = document.getElementById('lightbox-media');
  if (item.type === 'video') {
    if (item.playable) {
      mediaEl.innerHTML = `<video src="${item.src}" poster="${item.thumbnail || ''}" controls autoplay style="max-width:100%;max-height:75vh;border-radius:3px"></video>`;
    } else {
      // No embeddable video — show thumbnail + link to Strava
      const href = item.stravaUrl || `https://www.strava.com/activities/${item.activityId}`;
      mediaEl.innerHTML = `
        <div style="position:relative;display:inline-block">
          <img src="${item.thumbnail || item.src}" style="max-width:100%;max-height:65vh;border-radius:3px;display:block">
          <a href="${href}" target="_blank" rel="noopener" style="
            position:absolute;inset:0;display:flex;flex-direction:column;
            align-items:center;justify-content:center;gap:0.5rem;
            background:rgba(26,18,8,0.55);border-radius:3px;text-decoration:none">
            <span style="font-size:3rem;color:var(--white);text-shadow:0 2px 10px rgba(0,0,0,0.5)">▶</span>
            <span style="font-family:var(--sans);font-size:0.6rem;font-weight:600;text-transform:uppercase;
              letter-spacing:0.12em;color:var(--white);border-bottom:1px solid rgba(255,255,255,0.5);padding-bottom:2px">
              Watch on Strava ↗</span>
          </a>
        </div>`;
    }
  } else {
    mediaEl.innerHTML = `<img src="${item.src}" alt="${item.caption || ''}" style="max-width:100%;max-height:75vh;object-fit:contain;border-radius:3px">`;
  }

  document.getElementById('lightbox-caption').textContent = item.caption || '';
  document.getElementById('lightbox-meta').textContent =
    [item.date, item.location].filter(Boolean).join(' · ');

  const link = document.getElementById('lightbox-post-link');
  if (item.postLink) {
    link.href = item.postLink;
    link.textContent = `→ ${item.postTitle || 'Read the post'}`;
    link.style.display = 'inline-block';
  } else {
    link.style.display = 'none';
  }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navigateLightbox(1);
  if (e.key === 'ArrowLeft')  navigateLightbox(-1);
  if (e.key === 'Escape')     closeLightbox();
});

initGallery();
</script>

<script>
function toggleNav() {
  var btn  = document.getElementById("nav-hamburger");
  var menu = document.getElementById("nav-mobile-menu");
  btn.classList.toggle("open");
  menu.classList.toggle("open");
}
document.addEventListener("click", function(e) {
  var btn  = document.getElementById("nav-hamburger");
  var menu = document.getElementById("nav-mobile-menu");
  if (menu && menu.classList.contains("open") && !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    btn.classList.remove("open");
    menu.classList.remove("open");
  }
});
</script>
</body>
</html>
