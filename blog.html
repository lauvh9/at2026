<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Log — Laura on Trail</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .blog-hero {
      background: var(--cream);
      padding: 3rem 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .post-full-card {
      background: var(--white);
      border: 1px solid var(--fog);
      border-radius: 0;
      margin-bottom: 1.2rem;
      overflow: hidden;
      display: grid;
      grid-template-columns: 100px 1fr;
      transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .post-full-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(45,31,14,0.1);
    }
    .post-date-col {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 0.8rem;
      flex-shrink: 0;
    }
    .post-date-col .day {
      font-family: var(--serif);
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--ink);
      line-height: 1;
    }
    .post-date-col .month {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--trail);
    }
    .post-date-col .year {
      font-family: var(--mono);
      font-size: 0.55rem;
      color: rgba(44,85,48,0.5);
      margin-top: 2px;
    }
    .post-body { padding: 1.2rem 1.4rem; }
    .post-body h3 {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      line-height: 1.25;
    }
    .post-body .excerpt {
      font-size: 0.9rem;
      color: var(--earth);
      line-height: 1.55;
    }
    .post-tags { display: flex; gap: 6px; margin-top: 0.75rem; flex-wrap: wrap; }
    .post-tag {
      font-family: var(--mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 8px;
      border-radius: 2px;
      background: var(--paper);
      color: var(--trail);
    }
    .post-tag.miles { background: #d4edda; color: var(--pine); }
    .post-tag.zero  { background: #fce8d5; color: var(--earth); }
    .post-tag.resupply { background: #e8f4fd; color: var(--sky); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--trail);
    }
    .empty-state .big-blaze {
      width: 20px; height: 32px;
      background: var(--paper);
      border-radius: 3px;
      margin: 0 auto 1.5rem;
    }
    .empty-state p { font-style: italic; font-size: 1rem; }

    .write-cta {
      background: var(--pine);
      color: var(--white);
      border-radius: 4px;
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .write-cta h3 { font-family: var(--serif); font-size: 1.1rem; color: var(--white); }
    .write-cta p { font-size: 0.85rem; color: rgba(240,234,216,0.75); margin-top: 0.2rem; }

    @media (max-width: 600px) {
      .post-full-card { grid-template-columns: 1fr; }
      .post-date-col { flex-direction: row; gap: 8px; padding: 0.8rem 1rem; }
      .write-cta { flex-direction: column; }
    }
  </style>
</head>
