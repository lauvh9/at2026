name: Strava Trail Sync

on:
  # Runs every day at 9:30am EDT (1:30pm UTC). GitHub Actions can delay up to
  # 30-60 min, so starting 30 min early keeps it reliable by 10am Eastern.
  schedule:
    - cron: '30 13 * * *'

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      sync_before_date:
        description: 'Exclude activities on or after this date (YYYY-MM-DD). Leave blank for all.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    # Give the job permission to write files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Strava sync
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          SYNC_BEFORE_DATE:     ${{ inputs.sync_before_date }}
        run: |
          for attempt in 1 2 3; do
            node strava-sync.js && break
            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed, retrying in 30s..."
              sleep 30
            else
              echo "All 3 attempts failed."
              exit 1
            fi
          done

      - name: Commit and push any changes
        run: |
          git config user.name  "Trail Bot"
          git config user.email "trail-bot@users.noreply.github.com"
          git add -A
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "Trail sync $(date +'%Y-%m-%d')"
          git push
