name: Strava Trail Sync

on:
  # Runs every day at 10am EST (3pm UTC)
  schedule:
    - cron: '0 15 * * *'

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    # Give the job permission to write files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Strava sync
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: node strava-sync.js

      - name: Commit and push any changes
        run: |
          git config user.name  "Trail Bot"
          git config user.email "trail-bot@users.noreply.github.com"
          git add -A
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "Trail sync $(date +'%Y-%m-%d')"
          git push
