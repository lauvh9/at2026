name               = "at2026-comments"
main               = "worker.js"
compatibility_date = "2024-01-01"

# ── Email subscribers (Cloudflare KV) ────────────────────────────────────────
# Setup (one-time):
#   1. wrangler kv:namespace create SUBSCRIBERS
#   2. Copy the printed `id` value into the line below
#   3. wrangler deploy
#
# To export the full subscriber list:
#   wrangler kv:key list --namespace-id=<id>             # list all emails
#   wrangler kv:key list --namespace-id=<id> | jq '.[].name'  # emails only
# ─────────────────────────────────────────────────────────────────────────────

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id      = "REPLACE_WITH_KV_NAMESPACE_ID"
